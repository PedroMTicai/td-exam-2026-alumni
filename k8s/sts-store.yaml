apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-storage
spec:
  serviceName: svc-storage
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      containers:
        - name: storage
          image: gcr.io/icai2025-493206/backend-storage:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: volume-store
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: volume-store
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
